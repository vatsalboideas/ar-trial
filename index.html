<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
  />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="theme-color" content="#0a0a12" />
  <title>AR Lens</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <!-- Layer stack (bottom → top): camera → alpha overlay -->
  <video
    id="camera-feed"
    class="camera-feed"
    autoplay
    playsinline
    muted
    aria-hidden="true"
  ></video>

  <video
    id="overlay-video"
    class="overlay-video"
    autoplay
    playsinline
    muted
    loop
    preload="auto"
    aria-hidden="true"
  ></video>

  <!-- Camera flip (front / back) -->
  <button
    id="camera-toggle"
    class="camera-toggle"
    type="button"
    aria-label="Switch to back camera"
    hidden
  >
    <span class="camera-toggle-icon" aria-hidden="true">⟳</span>
    <span id="camera-toggle-label" class="camera-toggle-label">Front</span>
  </button>

  <!-- Status pill -->
  <div id="status-pill" class="status-pill" role="status" aria-live="polite" hidden></div>

  <!-- Loading screen -->
  <div id="loading-screen" class="loading-screen" role="alert" aria-busy="true">
    <div class="loading-card">
      <div class="loading-spinner" aria-hidden="true"></div>
      <p class="loading-title">AR Lens</p>
      <p id="loading-message" class="loading-message">Initializing camera…</p>
      <div class="loading-progress">
        <div id="loading-bar" class="loading-bar"></div>
      </div>
    </div>
  </div>

  <!-- Tap-to-start fallback (iOS autoplay / permission UX) -->
  <button id="tap-start" class="tap-start" type="button" hidden>
    <span class="tap-start-icon" aria-hidden="true">👆</span>
    <span class="tap-start-label">Tap to start experience</span>
  </button>

  <!-- Error screen -->
  <div id="error-screen" class="error-screen" role="alert" hidden>
    <div class="error-card">
      <p class="error-title">Unable to start</p>
      <p id="error-message" class="error-message"></p>
      <button id="error-retry" class="error-retry" type="button">Try again</button>
    </div>
  </div>

  <script type="module" src="script.js"></script>
</body>
</html>
