<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
  />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="theme-color" content="#0a0a12" />
  <title>AR Lens</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <!-- Layer stack (bottom → top): camera → alpha overlay -->
  <video
    id="camera-feed"
    class="camera-feed"
    autoplay
    playsinline
    webkit-playsinline
    muted
    aria-hidden="true"
  ></video>

  <video
    id="overlay-video"
    class="overlay-video"
    playsinline
    webkit-playsinline
    muted
    preload="auto"
    aria-hidden="true"
  ></video>

  <canvas id="capture-canvas" class="capture-canvas" aria-hidden="true"></canvas>

  <!-- Play / Pause -->
  <div id="playback-dock" class="playback-dock">
    <div id="playback-controls" class="playback-controls" hidden>
      <button id="btn-play" class="playback-btn playback-btn--play" type="button">Play</button>
      <button id="btn-pause" class="playback-btn playback-btn--pause" type="button" disabled>Pause</button>
    </div>
  </div>

  <!-- Countdown before play -->
  <div id="countdown" class="countdown" role="status" aria-live="assertive" hidden>
    <span id="countdown-number" class="countdown-number">3</span>
  </div>

  <!-- Camera flip (front / back) -->
  <button
    id="camera-toggle"
    class="camera-toggle"
    type="button"
    aria-label="Switch to back camera"
    hidden
  >
    <span class="camera-toggle-icon" aria-hidden="true">⟳</span>
    <span id="camera-toggle-label" class="camera-toggle-label">Front</span>
  </button>

  <!-- Status pill -->
  <div id="status-pill" class="status-pill" role="status" aria-live="polite" hidden></div>

  <!-- Loading screen -->
  <div id="loading-screen" class="loading-screen" role="alert" aria-busy="true">
    <div class="loading-card">
      <div class="loading-spinner" aria-hidden="true"></div>
      <p class="loading-title">AR Lens</p>
      <p id="loading-message" class="loading-message">Initializing camera…</p>
      <div class="loading-progress">
        <div id="loading-bar" class="loading-bar"></div>
      </div>
    </div>
  </div>

  <!-- Tap-to-start fallback (iOS autoplay / permission UX) -->
  <button id="tap-start" class="tap-start" type="button" hidden>
    <span class="tap-start-icon" aria-hidden="true">👆</span>
    <span class="tap-start-label">Tap to start experience</span>
  </button>

  <!-- Photo preview (iOS — long-press to save) -->
  <div id="capture-preview" class="capture-preview" hidden>
    <div class="capture-preview-card">
      <p class="capture-preview-title">Photo ready</p>
      <img id="capture-preview-img" class="capture-preview-img" alt="AR capture" />
      <p id="capture-preview-hint" class="capture-preview-hint"></p>
      <button id="capture-preview-close" class="capture-preview-close" type="button">Done</button>
    </div>
  </div>

  <!-- Error screen -->
  <div id="error-screen" class="error-screen" role="alert" hidden>
    <div class="error-card">
      <p class="error-title">Unable to start</p>
      <p id="error-message" class="error-message"></p>
      <button id="error-retry" class="error-retry" type="button">Try again</button>
    </div>
  </div>

  <script src="script.js" defer></script>
</body>
</html>
