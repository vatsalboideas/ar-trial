<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
  />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="theme-color" content="#0a0a12" />
  <title>AR Lens</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <!-- Layer stack (bottom → top): camera → alpha overlay -->
  <video
    id="camera-feed"
    class="camera-feed"
    autoplay
    playsinline
    webkit-playsinline
    muted
    aria-hidden="true"
  ></video>

  <video
    id="overlay-video"
    class="overlay-video"
    playsinline
    webkit-playsinline
    muted
    preload="auto"
    aria-hidden="true"
  ></video>

  <canvas id="render-canvas" class="render-canvas" aria-hidden="true" hidden></canvas>

  <canvas id="capture-canvas" class="capture-canvas" aria-hidden="true"></canvas>

  <main class="app-shell" aria-label="AR camera controls">
    <section class="controls-panel" aria-label="Camera controls">
      <div class="controls-head">
        <p class="controls-title">AR Lens Studio</p>
        <button
          id="controls-toggle"
          class="controls-toggle"
          type="button"
          aria-expanded="true"
          aria-controls="controls-content"
          aria-label="Collapse top options"
        >
          Hide
        </button>
      </div>
      <div id="controls-content" class="controls-row">
        <label id="camera-select-wrap" class="camera-resolution-wrap" hidden>
          <span class="camera-select-title">Camera</span>
          <select id="camera-select" class="camera-select" aria-label="Camera selection"></select>
        </label>

        <label id="camera-resolution-wrap" class="camera-resolution-wrap">
          <span class="camera-select-title">Resolution</span>
          <select id="camera-resolution" class="camera-select" aria-label="Camera resolution">
            <option value="hd">HD (720p)</option>
            <option value="fullhd">Full HD (1080p)</option>
            <option value="2k">2K (1440p)</option>
            <option value="4k" selected>4K (2160p)</option>
          </select>
        </label>

        <button
          id="mirror-toggle"
          class="mirror-toggle"
          type="button"
          aria-pressed="false"
          aria-label="Toggle camera mirroring"
        >
          Mirror Off
        </button>
      </div>
    </section>
    <button
      id="controls-open"
      class="controls-open"
      type="button"
      aria-controls="controls-content"
      aria-label="Show top options"
      hidden
    >
      Options
    </button>

    <!-- Play / Pause -->
    <div id="playback-dock" class="playback-dock">
      <div id="playback-controls" class="playback-controls" hidden>
        <button id="btn-play" class="playback-btn playback-btn--play" type="button">Play</button>
        <button id="btn-pause" class="playback-btn playback-btn--pause" type="button" disabled>Pause</button>
      </div>
    </div>
  </main>

  <!-- Countdown before play -->
  <div id="countdown" class="countdown" role="status" aria-live="assertive" hidden>
    <span id="countdown-number" class="countdown-number">3</span>
  </div>

  <!-- Status pill -->
  <div id="status-pill" class="status-pill" role="status" aria-live="polite" hidden></div>

  <!-- Loading screen -->
  <div id="loading-screen" class="loading-screen" role="alert" aria-busy="true">
    <div class="loading-card">
      <div class="loading-spinner" aria-hidden="true"></div>
      <p class="loading-title">AR Lens</p>
      <p id="loading-message" class="loading-message">Initializing camera…</p>
      <div class="loading-progress">
        <div id="loading-bar" class="loading-bar"></div>
      </div>
      <button id="loading-start" class="loading-start" type="button" hidden>Tap to start</button>
    </div>
  </div>

  <!-- Photo preview (iOS — long-press to save) -->
  <div id="capture-preview" class="capture-preview" hidden>
    <div class="capture-preview-card">
      <p class="capture-preview-title">Photo ready</p>
      <img id="capture-preview-img" class="capture-preview-img" alt="AR capture" />
      <p id="capture-preview-hint" class="capture-preview-hint"></p>
      <button id="capture-preview-close" class="capture-preview-close" type="button">Done</button>
    </div>
  </div>

  <!-- Upload QR preview (shows for 20s) -->
  <div id="upload-qr" class="upload-qr" hidden>
    <div class="upload-qr-card">
      <p class="upload-qr-title">Scan to download</p>
      <div id="upload-qr-code" class="upload-qr-code" aria-label="QR code download link"></div>
      <a
        id="upload-qr-link"
        class="upload-qr-link"
        href="#"
        target="_blank"
        rel="noopener noreferrer"
      >
        Open download link
      </a>
      <p id="upload-qr-timer" class="upload-qr-timer"></p>
    </div>
  </div>

  <!-- Error screen -->
  <div id="error-screen" class="error-screen" role="alert" hidden>
    <div class="error-card">
      <p class="error-title">Unable to start</p>
      <p id="error-message" class="error-message"></p>
      <button id="error-retry" class="error-retry" type="button">Try again</button>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" defer></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" defer></script>
  <script src="https://unpkg.com/@imagekit/javascript@5.0.0/dist/imagekit.min.js" defer></script>
  <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js" defer></script>
  <script src="script.js" defer></script>
</body>
</html>
