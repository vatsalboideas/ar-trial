<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
  />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="theme-color" content="#0a0a12" />
  <title>AR Lens</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <!-- Fullscreen camera background -->
  <video
    id="camera-feed"
    class="camera-feed"
    autoplay
    playsinline
    muted
    aria-hidden="true"
  ></video>

  <!-- Cat walks left → right across the screen -->
  <div id="lottie-walker" class="lottie-walker" aria-hidden="true">
    <div id="lottie-container" class="lottie-overlay"></div>
  </div>

  <!-- Bottom dock: Play / Pause -->
  <div id="lottie-dock" class="lottie-dock">
    <div id="playback-controls" class="playback-controls" hidden>
      <button id="btn-play" class="playback-btn playback-btn--play" type="button">Play</button>
      <button id="btn-pause" class="playback-btn playback-btn--pause" type="button" disabled>Pause</button>
    </div>
  </div>

  <!-- Camera flip (front / back) -->
  <button
    id="camera-toggle"
    class="camera-toggle"
    type="button"
    aria-label="Switch to back camera"
    hidden
  >
    <span class="camera-toggle-icon" aria-hidden="true">⟳</span>
    <span id="camera-toggle-label" class="camera-toggle-label">Front</span>
  </button>

  <canvas id="hands-canvas" class="hands-canvas" aria-hidden="true"></canvas>

  <!-- Premium glass UI chrome -->
  <div class="glass-chrome" aria-hidden="true">
    <div class="glass-top-bar"></div>
    <div class="glass-bottom-bar"></div>
  </div>

  <!-- Status pill (playback feedback) -->
  <div id="status-pill" class="status-pill" role="status" aria-live="polite" hidden></div>

  <!-- Countdown timer (shown before walk starts) -->
  <div id="countdown" class="countdown" role="status" aria-live="assertive" hidden>
    <span id="countdown-number" class="countdown-number">5</span>
    <span class="countdown-label">Get ready…</span>
  </div>

  <!-- Loading screen -->
  <div id="loading-screen" class="loading-screen" role="alert" aria-busy="true">
    <div class="loading-card">
      <div class="loading-spinner" aria-hidden="true"></div>
      <p class="loading-title">AR Lens</p>
      <p id="loading-message" class="loading-message">Initializing camera…</p>
      <div class="loading-progress">
        <div id="loading-bar" class="loading-bar"></div>
      </div>
    </div>
  </div>

  <!-- Tap-to-start fallback (iOS autoplay / permission UX) -->
  <button id="tap-start" class="tap-start" type="button" hidden>
    <span class="tap-start-icon" aria-hidden="true">👆</span>
    <span class="tap-start-label">Tap to start experience</span>
  </button>

  <!-- Error screen -->
  <div id="error-screen" class="error-screen" role="alert" hidden>
    <div class="error-card">
      <p class="error-title">Unable to start</p>
      <p id="error-message" class="error-message"></p>
      <button id="error-retry" class="error-retry" type="button">Try again</button>
    </div>
  </div>

  <!-- Gesture hint -->
  <div id="gesture-hint" class="swipe-hint" aria-hidden="true" hidden>
    Show ✌️ peace sign — cat walks once across the screen
  </div>

  <!-- MediaPipe Hands -->
  <script
    src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"
    crossorigin="anonymous"
  ></script>

  <!-- lottie-web -->
  <script
    src="https://cdnjs.cloudflare.com/ajax/libs/lottie-web/5.12.2/lottie.min.js"
    crossorigin="anonymous"
  ></script>

  <script type="module" src="script.js"></script>
</body>
</html>
