<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AR Cat</title>

  <!-- Google model-viewer v4.2.0 (March 2026) -->
  <script
    type="module"
    src="https://ajax.googleapis.com/ajax/libs/model-viewer/4.2.0/model-viewer.min.js"
  ></script>

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0f0f0f;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100dvh;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: #fff;
    }

    h1 {
      font-size: 1.4rem;
      font-weight: 600;
      letter-spacing: 0.04em;
      margin-bottom: 16px;
      opacity: 0.85;
    }

    model-viewer {
      width: 90vw;
      max-width: 480px;
      height: 60vh;
      border-radius: 20px;
      background: #1a1a2e;
      --poster-color: transparent;
    }

    /* Custom AR launch button */
    .ar-button {
      display: flex;
      align-items: center;
      gap: 8px;
      background: #fff;
      color: #111;
      border: none;
      border-radius: 30px;
      padding: 10px 22px;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      box-shadow: 0 4px 14px rgba(0,0,0,0.5);
      transition: transform 0.15s ease, box-shadow 0.15s ease;
    }

    .ar-button:hover {
      transform: scale(1.04);
      box-shadow: 0 6px 20px rgba(0,0,0,0.6);
    }

    .ar-button svg {
      width: 20px;
      height: 20px;
    }

    .hint {
      margin-top: 14px;
      font-size: 0.78rem;
      opacity: 0.45;
      text-align: center;
      max-width: 300px;
      line-height: 1.5;
    }
  </style>
</head>
<body>

  <h1>AR Cat</h1>

  <model-viewer
    id="cat-viewer"
    src="cat.glb"
    alt="An animated 3D cat"
    ar
    ar-modes="webxr scene-viewer quick-look"
    ar-scale="auto"
    autoplay
    animation-loop
    camera-controls
    auto-rotate
    auto-rotate-delay="500"
    rotation-per-second="30deg"
    shadow-intensity="1.2"
    environment-image="neutral"
    exposure="1"
    interaction-prompt="auto"
  >
    <!-- Custom AR button shown inside the model-viewer slot -->
    <button slot="ar-button" class="ar-button">
      <!-- AR icon -->
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
           stroke-linecap="round" stroke-linejoin="round">
        <path d="M3 7V5a2 2 0 0 1 2-2h2"/>
        <path d="M17 3h2a2 2 0 0 1 2 2v2"/>
        <path d="M21 17v2a2 2 0 0 1-2 2h-2"/>
        <path d="M7 21H5a2 2 0 0 1-2-2v-2"/>
        <path d="M12 8l4 2v4l-4 2-4-2v-4z"/>
        <line x1="12" y1="8" x2="12" y2="14"/>
        <line x1="8" y1="10" x2="16" y2="10"/>
      </svg>
      View in AR
    </button>
  </model-viewer>

  <p class="hint">
    Tap <strong>View in AR</strong> to place the cat in your space.<br/>
    Requires ARCore (Android) or AR Quick Look (iOS). Cat animation plays automatically.
  </p>

  <script>
    // Some GLB files have multiple clips; force the first one if autoplay doesn't pick it.
    const catViewer = document.getElementById('cat-viewer');
    catViewer.addEventListener('load', () => {
      const clips = catViewer.availableAnimations || [];
      if (clips.length > 0 && !catViewer.animationName) {
        catViewer.animationName = clips[0];
        catViewer.play();
      }
    });
  </script>

</body>
</html>
